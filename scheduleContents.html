<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSP Conference Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fafafa;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .schedule-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1.25rem;
            margin-bottom: 1rem;
            margin-top: 0.25rem;
            padding: 1.1rem 1.5rem;
            background: #f8fafc;
            border: 1px solid #e8ecf0;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .day-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .full-schedule-print-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            padding: 0.15rem 0 0.15rem 0.75rem;
            border-left: 1px solid #e2e8f0;
            min-width: 0;
        }

        .full-schedule-pdf-btn {
            padding: 0.65rem 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            border: 2px solid #4a90e2;
            border-radius: 6px;
            background: #4a90e2;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .full-schedule-pdf-btn:hover {
            background: #3a7bc8;
            border-color: #3a7bc8;
        }

        .full-schedule-pdf-hint {
            font-size: 0.8rem;
            color: #777;
            max-width: 220px;
            line-height: 1.35;
        }

        @media (max-width: 720px) {
            .full-schedule-print-wrap {
                border-left: none;
                border-top: 1px solid #e2e8f0;
                padding-left: 0;
                padding-top: 0.85rem;
                width: 100%;
            }
        }

        .day-selector label {
            font-weight: 500;
            color: #555;
        }

        select {
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.2s;
            min-width: 200px;
        }

        select:hover {
            border-color: #999;
        }

        select:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .schedule-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .session {
            border-bottom: 3px solid #e8e8e8;
        }

        .session:last-child {
            border-bottom: none;
        }

        .session-header {
            background: #f8f9fa;
            padding: 1.25rem 1.5rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .session-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.25rem;
        }

        .session-time {
            font-size: 0.9rem;
            color: #666;
        }

        .events-list {
            padding: 0;
        }

        .event {
            padding: 1.5rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .event:hover {
            background-color: #fafafa;
        }

        .event:last-child {
            border-bottom: none;
        }

        .pre-events {
            border-bottom: 3px solid #e8e8e8;
        }

        .event.break {
            background: #fff9e6;
            border-left: 4px solid #ffc107;
        }

        .event.introduction {
            background: #e8f4f8;
            border-left: 4px solid #2196f3;
        }

        .event.poster {
            background: #f0f8f0;
            border-left: 4px solid #4caf50;
            cursor: pointer;
        }

        .event.poster:hover {
            background: #e8f5e8;
        }

        .poster-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #ddd;
            display: none;
        }

        .event.poster.expanded .poster-list {
            display: block;
        }

        .poster-item {
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            background: white;
            border-radius: 4px;
            border-left: 3px solid #4caf50;
        }

        .poster-item.hidden {
            display: none;
        }

        .poster-item .abstract-id {
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .poster-item:last-child {
            margin-bottom: 0;
        }

        .poster-title {
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .poster-authors {
            font-size: 0.85rem;
            color: #666;
        }

        .poster-authors-label {
            font-weight: 500;
            color: #888;
            margin-right: 0.5rem;
        }

        .poster-count {
            display: inline-block;
            margin-left: 0.75rem;
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }

        .expand-icon {
            display: inline-block;
            margin-left: 0.5rem;
            transition: transform 0.2s;
            font-size: 0.9rem;
            color: #4caf50;
        }

        .event.poster.expanded .expand-icon {
            transform: rotate(90deg);
        }

        .event-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .event-time {
            font-size: 0.95rem;
            font-weight: 600;
            color: #666;
            min-width: 150px;
            flex-shrink: 0;
        }

        .event-type {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .event-content {
            margin-left: 90px;
        }

        .abstract-id {
            display: inline-block;
            background: #4a90e2;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .abstract-pdf-link {
            font-size: 0.85rem;
            margin-left: 0.5rem;
            color: #4a90e2;
        }

        .abstract-pdf-link:hover {
            text-decoration: underline;
        }

        .poster-slides-pdf-link {
            font-size: 0.85rem;
            margin-left: 0.5rem;
            color: #4a90e2;
        }

        .poster-slides-pdf-link:hover {
            text-decoration: underline;
        }

        .event-title {
            font-size: 1.15rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .event.break .event-title {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
        }

        .authors {
            margin-top: 0.75rem;
        }

        .authors-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .author-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .author {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: #f0f4f8;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #2c3e50;
        }

        .author-name {
            font-weight: 500;
        }

        .topic {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
        }

        .speaker {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #555;
        }

        .speaker-label {
            font-weight: 500;
            color: #888;
        }

        .location {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #777;
        }

        .location-label {
            font-weight: 500;
            color: #888;
        }

        .abstract-text {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
            padding: 0.75rem;
            background: #f8f9fa;
            border-radius: 4px;
            border-left: 3px solid #4a90e2;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem 0;
        }

        .search-container {
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            transition: border-color 0.2s;
        }

        .search-bar:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .search-bar::placeholder {
            color: #999;
        }

        .event.hidden {
            display: none;
        }

        .session.hidden {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .event-header {
                flex-direction: column;
                gap: 0.5rem;
            }

            .event-content {
                margin-left: 0;
            }

            .event-time {
                min-width: auto;
            }

            .search-bar {
                max-width: 100%;
            }
        }

        .print-day-block {
            margin-top: 1.5rem;
        }

        .print-day-block:first-of-type {
            margin-top: 0;
        }

        /* Full-schedule / print preview: day strips should jump out when scanning */
        .print-day-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #fff;
            background: #750014;
            margin: 0 0 1rem 0;
            padding: 0.65rem 1rem;
            border: none;
            border-radius: 6px;
            border-bottom: 4px solid #5c0010;
            page-break-after: avoid;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .print-day-block:not(:first-of-type) .print-day-title {
            page-break-before: always;
        }

        @media print {
            @page {
                margin: 0.45in 0.5in;
                size: letter;
            }

            .schedule-screen-only {
                display: none !important;
            }

            body,
            #schedule-content-container {
                background: white !important;
                padding: 0 !important;
                max-width: none !important;
                font-size: 9pt !important;
                line-height: 1.28 !important;
                color: #111 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            header {
                margin-bottom: 0.35rem !important;
                padding-bottom: 0.35rem !important;
                border-bottom: 1px solid #999 !important;
            }

            header h1 {
                font-size: 14pt !important;
                font-weight: 600 !important;
                margin-bottom: 0 !important;
            }

            .print-day-title {
                font-size: 17pt !important;
                font-weight: 800 !important;
                letter-spacing: 0.1em !important;
                text-transform: uppercase !important;
                color: #fff !important;
                background: #750014 !important;
                margin: 0.5rem 0 0.45rem 0 !important;
                padding: 0.22in 0.28in !important;
                border: none !important;
                border-radius: 0 !important;
                border-bottom: 5px solid #4a0010 !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .print-day-block:first-of-type .print-day-title {
                margin-top: 0.15rem !important;
            }

            .print-day-block:not(:first-of-type) .print-day-title {
                page-break-before: always !important;
                margin-top: 0 !important;
            }

            .schedule-container {
                box-shadow: none !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }

            .pre-events {
                border-bottom: 1px solid #ccc !important;
            }

            .session {
                border-bottom: 1px solid #bbb !important;
                overflow: visible !important;
                break-inside: auto !important;
                page-break-inside: auto !important;
            }

            .events-list {
                overflow: visible !important;
            }

            .session-header {
                padding: 0.28rem 0.4rem !important;
                background: #eaeaea !important;
                border-bottom: 1px solid #bbb !important;
            }

            .session-title {
                font-size: 9.5pt !important;
                font-weight: 700 !important;
                margin-bottom: 0 !important;
            }

            .session-time {
                font-size: 8pt !important;
            }

            /* Keep short talks/breaks intact; poster sessions are huge — must allow breaks or print engines add blank pages */
            .event:not(.poster) {
                padding: 0.15rem 0.35rem !important;
                border-bottom: 1px solid #e5e5e5 !important;
                background: white !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .event.poster {
                padding: 0.15rem 0.35rem !important;
                border-bottom: 1px solid #e5e5e5 !important;
                break-inside: auto !important;
                page-break-inside: auto !important;
                cursor: default !important;
                overflow: visible !important;
                height: auto !important;
                max-height: none !important;
                min-height: 0 !important;
            }

            /* Flex rows are a common source of bad print fragmentation; stack header for poster blocks */
            .event.poster .event-header {
                display: block !important;
            }

            .event.poster .event-time {
                margin-bottom: 0.12rem !important;
            }

            .event.break,
            .event.introduction,
            .event.poster {
                background: #f7f7f7 !important;
                border-left: 2px solid #bbb !important;
            }

            .event-header {
                gap: 0.35rem !important;
                margin-bottom: 0.08rem !important;
                align-items: baseline !important;
            }

            .event-time {
                min-width: 5.6em !important;
                font-size: 8.5pt !important;
                font-weight: 600 !important;
            }

            .event-content {
                margin-left: 0 !important;
            }

            .event-type {
                font-size: 7.5pt !important;
                letter-spacing: 0.02em !important;
                margin-bottom: 0.05rem !important;
            }

            .abstract-id {
                padding: 0.06rem 0.28rem !important;
                font-size: 7.5pt !important;
                margin-bottom: 0.08rem !important;
            }

            .abstract-pdf-link {
                display: none !important;
            }

            /* Invited-talk blurbs are very long; omit from print — use the website for full text */
            .abstract-text {
                display: none !important;
            }

            .event-title {
                font-size: 9.5pt !important;
                line-height: 1.28 !important;
                margin-bottom: 0.1rem !important;
            }

            .event.break .event-title {
                font-size: 9pt !important;
            }

            .authors {
                margin-top: 0.12rem !important;
            }

            .authors-label {
                display: inline !important;
                font-size: 8pt !important;
                margin-right: 0.2rem !important;
                margin-bottom: 0 !important;
            }

            .author-list {
                display: inline !important;
                flex-wrap: unset !important;
                gap: 0 !important;
            }

            .author {
                display: inline !important;
                padding: 0 !important;
                background: transparent !important;
                border-radius: 0 !important;
                font-size: 8pt !important;
            }

            .author + .author::before {
                content: " · " !important;
            }

            .speaker,
            .topic,
            .location {
                font-size: 8pt !important;
                margin-top: 0.06rem !important;
            }

            .expand-icon {
                display: none !important;
            }

            /*
             * Do NOT use CSS multi-column layout in print: Chrome/Safari often leave
             * huge blank regions or extra pages after tall column flows.
             */
            .event.poster .poster-list {
                display: block !important;
                margin-top: 0.2rem !important;
                padding-top: 0.2rem !important;
                border-top: 1px solid #ccc !important;
                column-count: unset !important;
                column-gap: unset !important;
                column-fill: unset !important;
                break-inside: auto !important;
                page-break-inside: auto !important;
                overflow: visible !important;
            }

            .poster-item {
                /* avoid + multi-column often leaves huge trailing gaps / extra pages in Chrome print */
                break-inside: auto !important;
                page-break-inside: auto !important;
                padding: 0.12rem 0.22rem !important;
                margin-bottom: 0.15rem !important;
                background: white !important;
                border-left-width: 2px !important;
            }

            .poster-item .abstract-id {
                margin-bottom: 0.05rem !important;
                margin-right: 0.15rem !important;
            }

            .poster-title {
                font-size: 8.5pt !important;
                margin-bottom: 0.04rem !important;
                line-height: 1.25 !important;
            }

            .poster-authors {
                font-size: 7.5pt !important;
                line-height: 1.25 !important;
            }

            .poster-authors-label {
                font-weight: 600 !important;
            }

            a {
                color: inherit !important;
                text-decoration: none !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>HSP Conference Schedule</h1>
        <div class="schedule-toolbar schedule-screen-only">
            <div class="day-selector">
                <label for="daySelect">Select Day:</label>
                <select id="daySelect">
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="full-schedule-print-wrap">
                <button type="button" id="fullSchedulePdfBtn" class="full-schedule-pdf-btn">Save full schedule (PDF)</button>
                <span class="full-schedule-pdf-hint">Opens your browser’s print dialog — choose <strong>Save as PDF</strong> as the destination.</span>
            </div>
        </div>
        <div class="search-container schedule-screen-only">
            <input type="text" id="searchBar" class="search-bar" placeholder="Search by title, author, abstract ID, or topic...">
        </div>
    </header>

    <div id="scheduleContainer" class="schedule-container">
        <div class="loading">Loading schedule...</div>
    </div>

    <script>
        let scheduleData = null;
        const SCHEDULE_DAY_ORDER = ['thursday', 'friday', 'saturday'];
        const posterSlidesAvailableIds = new Set();
        const daySelect = document.getElementById('daySelect');
        const scheduleContainer = document.getElementById('scheduleContainer');
        const searchBar = document.getElementById('searchBar');

        document.getElementById('fullSchedulePdfBtn').addEventListener('click', printFullSchedulePdf);

        // Load schedule data and discover which standardized poster/slides PDFs exist.
        fetch('schedule.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load schedule.json');
                }
                return response.json();
            })
            .then(data => loadPosterSlidesAvailability(data).then(() => data))
            .then(data => {
                scheduleData = data;
                populateDaySelector();
                displayDay('thursday'); // Default to Thursday
            })
            .catch(error => {
                scheduleContainer.innerHTML = `<div class="error">Error loading schedule: ${error.message}</div>`;
                console.error('Error:', error);
            });

        function populateDaySelector() {
            const days = Object.keys(scheduleData.days);
            daySelect.innerHTML = '';
            
            days.forEach(day => {
                const option = document.createElement('option');
                option.value = day;
                option.textContent = capitalizeDay(day);
                daySelect.appendChild(option);
            });

            daySelect.addEventListener('change', (e) => {
                displayDay(e.target.value);
            });

            // Add search functionality
            searchBar.addEventListener('input', (e) => {
                filterSchedule(e.target.value);
            });
        }

        function capitalizeDay(day) {
            return day.charAt(0).toUpperCase() + day.slice(1);
        }

        function getOrderedDayKeys() {
            if (!scheduleData || !scheduleData.days) return [];
            const keys = Object.keys(scheduleData.days);
            const ordered = SCHEDULE_DAY_ORDER.filter(k => keys.includes(k));
            keys.forEach(k => {
                if (!ordered.includes(k)) ordered.push(k);
            });
            return ordered;
        }

        function buildDayHtml(dayKey) {
            if (!scheduleData || !scheduleData.days[dayKey]) {
                return '<div class="error">Day not found</div>';
            }

            const day = scheduleData.days[dayKey];
            let html = '';

            // Render pre-session events (e.g. registration) outside any session block
            if (day.pre_events && day.pre_events.length > 0) {
                html += '<div class="pre-events">';
                day.pre_events.forEach(event => {
                    html += renderEvent(event);
                });
                html += '</div>';
            }

            // Group events by session
            let currentSession = null;
            day.sessions.forEach(session => {
                if (session.events.length === 0) return;

                // Session header
                if (currentSession !== session.session_title) {
                    if (currentSession !== null) {
                        html += '</div></div>'; // Close previous session
                    }
                    html += `
                        <div class="session" data-session-title="${escapeHtml(session.session_title)}">
                            <div class="session-header">
                                <div class="session-title">${session.session_title}</div>
                                ${session.start_time && session.end_time ? 
                                    `<div class="session-time">${formatTime(session.start_time)} - ${formatTime(session.end_time)}</div>` : 
                                    ''}
                            </div>
                            <div class="events-list">
                    `;
                    currentSession = session.session_title;
                }

                // Events in this session
                session.events.forEach(event => {
                    html += renderEvent(event);
                });
            });

            if (currentSession !== null) {
                html += '</div></div>'; // Close last session
            }

            return html;
        }

        function displayDay(dayKey) {
            scheduleContainer.innerHTML = buildDayHtml(dayKey);

            // Add click handlers for poster sessions
            document.querySelectorAll('.event.poster').forEach(posterEvent => {
                posterEvent.addEventListener('click', function() {
                    this.classList.toggle('expanded');
                });
            });

            // Apply current search filter if any
            if (searchBar.value) {
                filterSchedule(searchBar.value);
            }
        }

        function printFullSchedulePdf() {
            if (!scheduleData || !scheduleData.days) return;

            const savedDayKey = daySelect.value;
            let restored = false;

            const restore = () => {
                if (restored) return;
                restored = true;
                document.body.classList.remove('printing-full-schedule');
                daySelect.value = savedDayKey;
                displayDay(savedDayKey);
            };

            const parts = [];
            getOrderedDayKeys().forEach(dayKey => {
                parts.push(
                    `<section class="print-day-block"><h2 class="print-day-title">${capitalizeDay(dayKey)}</h2>${buildDayHtml(dayKey)}</section>`
                );
            });
            scheduleContainer.innerHTML = parts.join('');
            document.body.classList.add('printing-full-schedule');

            document.querySelectorAll('.event.poster').forEach(el => {
                el.classList.add('expanded');
            });

            window.addEventListener('afterprint', restore, { once: true });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    window.print();
                });
            });
        }

        function filterSchedule(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') {
                // Show all events, sessions, and posters
                document.querySelectorAll('.event').forEach(event => {
                    event.classList.remove('hidden');
                });
                document.querySelectorAll('.session').forEach(session => {
                    session.classList.remove('hidden');
                });
                document.querySelectorAll('.poster-item').forEach(poster => {
                    poster.classList.remove('hidden');
                });
                return;
            }

            const searchLower = searchTerm.toLowerCase().trim();

            // Filter regular events
            document.querySelectorAll('.event').forEach(eventEl => {
                const isPosterSession = eventEl.classList.contains('poster');
                
                if (isPosterSession) {
                    // For poster sessions, filter individual posters
                    // Auto-expand poster session to show filtered results
                    eventEl.classList.add('expanded');
                    filterPostersInSession(eventEl, searchLower);
                    // Show the poster session if it has any visible posters
                    const hasVisiblePosters = eventEl.querySelector('.poster-item:not(.hidden)');
                    if (hasVisiblePosters) {
                        eventEl.classList.remove('hidden');
                    } else {
                        eventEl.classList.add('hidden');
                    }
                } else {
                    // For regular events, filter the event itself
                    const eventText = getEventSearchText(eventEl, false); // Don't include poster content
                    const matches = eventText.toLowerCase().includes(searchLower);
                    
                    if (matches) {
                        eventEl.classList.remove('hidden');
                    } else {
                        eventEl.classList.add('hidden');
                    }
                }
            });

            // Hide sessions with no visible events
            document.querySelectorAll('.session').forEach(session => {
                const eventsList = session.querySelector('.events-list');
                if (eventsList) {
                    const hasVisibleEvents = eventsList.querySelector('.event:not(.hidden)');
                    if (hasVisibleEvents) {
                        session.classList.remove('hidden');
                    } else {
                        session.classList.add('hidden');
                    }
                }
            });
        }

        function filterPostersInSession(posterSessionEl, searchLower) {
            const posterItems = posterSessionEl.querySelectorAll('.poster-item');
            
            posterItems.forEach(posterItem => {
                const posterText = getPosterSearchText(posterItem);
                const matches = posterText.toLowerCase().includes(searchLower);
                
                if (matches) {
                    posterItem.classList.remove('hidden');
                } else {
                    posterItem.classList.add('hidden');
                }
            });
        }

        function getPosterSearchText(posterElement) {
            let text = '';
            
            // Get abstract ID
            const abstractId = posterElement.querySelector('.abstract-id');
            if (abstractId) {
                text += abstractId.textContent + ' ';
            }
            
            // Get title
            const title = posterElement.querySelector('.poster-title');
            if (title) {
                text += title.textContent + ' ';
            }
            
            // Get authors
            const authors = posterElement.querySelector('.poster-authors');
            if (authors) {
                text += authors.textContent + ' ';
            }
            
            return text;
        }

        function getEventSearchText(eventElement, includePosters = true) {
            // Collect all searchable text from the event
            let text = '';
            
            // Get abstract ID
            const abstractId = eventElement.querySelector('.abstract-id');
            if (abstractId) {
                text += abstractId.textContent + ' ';
            }
            
            // Get title
            const title = eventElement.querySelector('.event-title');
            if (title) {
                text += title.textContent + ' ';
            }
            
            // Get speaker (for invited talks / introduction)
            const speaker = eventElement.querySelector('.speaker');
            if (speaker) {
                text += speaker.textContent + ' ';
            }

            // Get authors
            const authors = eventElement.querySelectorAll('.author-name');
            authors.forEach(author => {
                text += author.textContent + ' ';
            });
            
            // Get topic
            const topic = eventElement.querySelector('.topic');
            if (topic) {
                text += topic.textContent + ' ';
            }
            
            // Get abstract
            const abstract = eventElement.querySelector('.abstract-text');
            if (abstract) {
                text += abstract.textContent + ' ';
            }
            
            // Only include poster content if requested (for non-poster events that might reference posters)
            if (includePosters) {
                const posterTitles = eventElement.querySelectorAll('.poster-title');
                posterTitles.forEach(posterTitle => {
                    text += posterTitle.textContent + ' ';
                });
                
                const posterAuthors = eventElement.querySelectorAll('.poster-authors');
                posterAuthors.forEach(posterAuthor => {
                    text += posterAuthor.textContent + ' ';
                });
            }
            
            return text;
        }

        function renderEvent(event) {
            const isBreak = event.type && event.type.toLowerCase().includes('break');
            const isIntroduction = event.type && event.type.toLowerCase().includes('introduction');
            const isPoster = event.type && event.type.toLowerCase().includes('poster');
            const isInvitedTalk = event.type && event.type.toLowerCase().includes('invited');
            const eventClass = isBreak ? 'break' : (isIntroduction ? 'introduction' : (isPoster ? 'poster' : ''));
            
            // Use these variables in the function scope
            const shouldShowType = !isBreak && !isPoster;
            const shouldShowTopic = !isBreak && !isPoster;
            // Show speaker only for Conf. Introduction and Invited Talks (they don't list authors separately)
            const shouldShowSpeaker = isIntroduction || isInvitedTalk;
            
            // Store isPoster for use in poster list rendering
            const hasPosters = isPoster && event.posters && event.posters.length > 0;

            let html = `<div class="event ${eventClass}">`;
            html += '<div class="event-header">';
            
            if (event.time) {
                const timeDisplay = event.end_time
                    ? `${formatTime(event.time)} – ${formatTime(event.end_time)}`
                    : formatTime(event.time);
                html += `<div class="event-time">${timeDisplay}</div>`;
            }
            
            html += '<div class="event-content">';
            
            if (event.type && shouldShowType) {
                html += `<div class="event-type">${event.type}</div>`;
            }

            if (event.abstract_id) {
                html += `<span class="abstract-id">Abstract #${event.abstract_id}</span>${renderPdfLinks(event.abstract_id)}`;
            }

            if (event.title) {
                html += `<div class="event-title">${escapeHtml(event.title)}</div>`;
            } else if (isBreak) {
                html += `<div class="event-title">${escapeHtml(event.type)}</div>`;
            } else if (isPoster) {
                const posterCount = event.posters ? ` (${event.posters.length} posters)` : '';
                html += `<div class="event-title">${escapeHtml(event.type)}${posterCount}<span class="expand-icon">▶</span></div>`;
            }

            // Add abstract for invited talks if available
            if (event.abstract && !isBreak && !isPoster) {
                html += `<div class="abstract-text">${escapeHtml(event.abstract)}</div>`;
            }

            if (event.speaker && shouldShowSpeaker) {
                html += `<div class="speaker"><span class="speaker-label">Speaker:</span> ${escapeHtml(event.speaker)}</div>`;
            }

            if (event.authors && event.authors.length > 0) {
                html += '<div class="authors">';
                html += '<div class="authors-label">Authors:</div>';
                html += '<div class="author-list">';
                event.authors.forEach(author => {
                    const authorName = `${author.first_name} ${author.last_name}`;
                    html += `<span class="author"><span class="author-name">${escapeHtml(authorName)}</span></span>`;
                });
                html += '</div></div>';
            }

            if (event.topic && shouldShowTopic) {
                html += `<div class="topic">${escapeHtml(event.topic)}</div>`;
            }

            if (event.location) {
                html += `<div class="location"><span class="location-label">Location:</span> ${escapeHtml(event.location)}</div>`;
            }

            // Add poster list if this is a poster session
            if (hasPosters) {
                html += '<div class="poster-list">';
                event.posters.forEach(poster => {
                    html += '<div class="poster-item">';
                    // Add abstract number badge (like talks have)
                    if (poster.submission_id) {
                        html += `<span class="abstract-id">Abstract #${poster.submission_id}</span>${renderPdfLinks(poster.submission_id)}`;
                    }
                    html += `<div class="poster-title">${escapeHtml(poster.title)}</div>`;
                    if (poster.authors && poster.authors.length > 0) {
                        const authorsStr = poster.authors.map(a => `${a.first_name} ${a.last_name}`).join(', ');
                        html += `<div class="poster-authors"><span class="poster-authors-label">Authors:</span>${escapeHtml(authorsStr)}</div>`;
                    }
                    html += '</div>';
                });
                html += '</div>';
            }

            html += '</div></div></div>';
            return html;
        }

        function loadPosterSlidesAvailability(data) {
            const ids = collectPosterSlidesCandidateIds(data);
            const checks = ids.map(id => checkPosterSlidesFileExists(id).then(exists => ({ id, exists })));
            return Promise.all(checks)
                .then(results => {
                    results.forEach(result => {
                        if (result.exists) {
                            posterSlidesAvailableIds.add(result.id);
                        }
                    });
                })
                .catch(() => undefined);
        }

        function collectPosterSlidesCandidateIds(data) {
            if (!data || !data.days) return [];
            const ids = new Set();

            Object.values(data.days).forEach(day => {
                (day.sessions || []).forEach(session => {
                    (session.events || []).forEach(event => {
                        if (event.abstract_id) {
                            ids.add(String(parseInt(event.abstract_id, 10)));
                        }
                        (event.posters || []).forEach(poster => {
                            if (poster.submission_id) {
                                ids.add(String(parseInt(poster.submission_id, 10)));
                            }
                        });
                    });
                });
            });

            return Array.from(ids);
        }

        function checkPosterSlidesFileExists(abstractId) {
            const normalizedId = parseInt(abstractId, 10);
            const url = `posters/upload_${normalizedId}.pdf`;

            return fetch(url, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) return true;
                    if (response.status !== 405 && response.status !== 501) return false;
                    return fetch(url, { method: 'GET' }).then(getResponse => getResponse.ok);
                })
                .catch(() => false);
        }

        function getPosterSlidesHref(abstractId) {
            const id = String(parseInt(abstractId, 10));
            if (!posterSlidesAvailableIds.has(id)) return null;
            return `posters/upload_${parseInt(id, 10)}.pdf`;
        }

        function renderPdfLinks(abstractId) {
            const normalizedId = parseInt(abstractId, 10);
            const abstractHref = `abstracts/submission_${normalizedId}.pdf`;
            const posterSlidesHref = getPosterSlidesHref(abstractId);
            const posterSlidesLink = posterSlidesHref
                ? `<a href="${posterSlidesHref}" class="poster-slides-pdf-link" target="_blank" rel="noopener">Poster/Slides PDF</a>`
                : '';
            return ` <a href="${abstractHref}" class="abstract-pdf-link" target="_blank" rel="noopener">Abstract PDF</a>${posterSlidesLink}`;
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            // Convert 24-hour to 12-hour format
            const [hours, minutes] = timeStr.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'pm' : 'am';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes}${ampm}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
